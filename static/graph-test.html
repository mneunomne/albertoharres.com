<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Graph perf test (no Vue)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff; font-family: monospace; }
    #graph { position: fixed; inset: 0; }
    #meter {
      position: fixed; top: 8px; left: 8px; z-index: 10;
      background: rgba(0,0,0,.8); color: #0f0; padding: 8px 10px;
      font-size: 12px; line-height: 1.5; white-space: pre; border-radius: 4px;
      pointer-events: none;
    }
    #note { position: fixed; bottom: 8px; left: 8px; z-index: 10; color: #444; font-size: 11px; }
  </style>

  <!-- Shared single copy of three across all packages via ?external=three -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.152.2",
      "three-spritetext": "https://esm.sh/three-spritetext@1.8.1?external=three",
      "3d-force-graph": "https://esm.sh/3d-force-graph@1.71.4?external=three",
      "d3-bboxCollide": "https://esm.sh/d3-bboxCollide@1.0.4"
    }
  }
  </script>
</head>
<body>
  <div id="graph"></div>
  <div id="meter">booting…</div>
  <div id="note">Pure Three.js + 3d-force-graph. Zero Vue / Vuex / Nuxt. Orbit-drag to compare against the app.</div>

  <script type="module">
    import ForceGraph3D from "3d-force-graph";
    import SpriteText from "three-spritetext";
    import * as THREE from "three";
    import { bboxCollide } from "d3-bboxCollide";

    // ---- same constants as the app (utils/index.js) ----
    const IMAGE_SCALE = 35;
    const CANVAS_OUT_MARGIN = 200;
    const CAMERA_DISTANCE_FAR = 400;
    const LINE_OPACITY = 0.1;
    const LINK_DISTANCE = 50;
    const PROJECT_MARGIN = 3;
    const getCanvasHeight = (w) => w.innerHeight + CANVAS_OUT_MARGIN * 2;

    // ---- graph data: generated from assets/content/projects/*.json ----
    const gData = {"nodes": [{"id": "adnauseam", "val": 10, "type": "project", "thumbnail": "/img/thumb-adnauseam.jpg", "width": 1280, "height": 773, "importance": 1, "title": "AdNauseam"}, {"id": "web", "val": 3, "type": "tag"}, {"id": "javascript", "val": 2, "type": "tag"}, {"id": "obfuscation", "val": 1, "type": "tag"}, {"id": "dataviz", "val": 2, "type": "tag"}, {"id": "anti-epigraph-of-a-colonial-monument", "val": 10, "type": "project", "thumbnail": "/img/thumb-anti-epigraph-of-a-colonial-monument.jpg", "width": 1200, "height": 800, "importance": 1, "title": "Anti-Epigraph of a Colonial Monument"}, {"id": "ceramics", "val": 3, "type": "tag"}, {"id": "installation", "val": 5, "type": "tag"}, {"id": "processing", "val": 5, "type": "tag"}, {"id": "electronics", "val": 4, "type": "tag"}, {"id": "clay", "val": 3, "type": "tag"}, {"id": "ai", "val": 2, "type": "tag"}, {"id": "arche-scriptures", "val": 10, "type": "project", "thumbnail": "/img/thumb-arche-scriptures.jpg", "width": 1280, "height": 853, "importance": 1.3, "title": "arche-scriptures"}, {"id": "archiving", "val": 4, "type": "tag"}, {"id": "sound", "val": 5, "type": "tag"}, {"id": "arduino", "val": 1, "type": "tag"}, {"id": "materiality", "val": 2, "type": "tag"}, {"id": "central", "val": 10, "type": "project", "thumbnail": "/img/thumb-central.jpg", "width": 955, "height": 638, "importance": 0.9, "title": "Central"}, {"id": "theater", "val": 1, "type": "tag"}, {"id": "mapping", "val": 1, "type": "tag"}, {"id": "street", "val": 1, "type": "tag"}, {"id": "projection_mapping", "val": 3, "type": "tag"}, {"id": "performance", "val": 1, "type": "tag"}, {"id": "edit-wars", "val": 10, "type": "project", "thumbnail": "/img/thumb-edit-wars.jpg", "width": 720, "height": 540, "importance": 1, "title": "Edit Wars"}, {"id": "api", "val": 2, "type": "tag"}, {"id": "opencalls-ai-1", "val": 10, "type": "project", "thumbnail": "/img/thumb-opencalls.jpg", "width": 1200, "height": 674, "importance": 0.8, "title": "opencalls.ai"}, {"id": "simbinoise", "val": 10, "type": "project", "thumbnail": "/img/thumb-simbinoise.jpg", "width": 1200, "height": 800, "importance": 0.8, "title": "Simbinoise"}, {"id": "eletronics", "val": 1, "type": "tag"}, {"id": "glitch", "val": 1, "type": "tag"}, {"id": "terra-inscrita", "val": 10, "type": "project", "thumbnail": "/img/thumb-terra-inscrita.jpg", "width": 1024, "height": 768, "importance": 1.3, "title": "Terra Inscrita"}, {"id": "water", "val": 1, "type": "tag"}, {"id": "research", "val": 2, "type": "tag"}, {"id": "the-living-body-is-the-center-of-all-politics", "val": 10, "type": "project", "thumbnail": "/img/thumb-living.jpg", "width": 1200, "height": 903, "importance": 1.0, "title": "The living body is the center of all politics"}, {"id": "voices", "val": 2, "type": "tag"}, {"id": "vozes-da-terra", "val": 10, "type": "project", "thumbnail": "/img/thumb-vozes.jpg", "width": 711, "height": 400, "importance": 1, "title": "Vozes da Terra "}], "links": [{"source": "adnauseam", "target": "web"}, {"source": "adnauseam", "target": "javascript"}, {"source": "adnauseam", "target": "obfuscation"}, {"source": "adnauseam", "target": "dataviz"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "ceramics"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "installation"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "processing"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "electronics"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "clay"}, {"source": "anti-epigraph-of-a-colonial-monument", "target": "ai"}, {"source": "arche-scriptures", "target": "archiving"}, {"source": "arche-scriptures", "target": "ceramics"}, {"source": "arche-scriptures", "target": "installation"}, {"source": "arche-scriptures", "target": "sound"}, {"source": "arche-scriptures", "target": "processing"}, {"source": "arche-scriptures", "target": "arduino"}, {"source": "arche-scriptures", "target": "electronics"}, {"source": "arche-scriptures", "target": "materiality"}, {"source": "arche-scriptures", "target": "clay"}, {"source": "central", "target": "theater"}, {"source": "central", "target": "mapping"}, {"source": "central", "target": "street"}, {"source": "central", "target": "processing"}, {"source": "central", "target": "projection_mapping"}, {"source": "central", "target": "performance"}, {"source": "edit-wars", "target": "installation"}, {"source": "edit-wars", "target": "web"}, {"source": "edit-wars", "target": "projection_mapping"}, {"source": "edit-wars", "target": "sound"}, {"source": "edit-wars", "target": "api"}, {"source": "edit-wars", "target": "dataviz"}, {"source": "opencalls-ai-1", "target": "ai"}, {"source": "opencalls-ai-1", "target": "javascript"}, {"source": "opencalls-ai-1", "target": "archiving"}, {"source": "opencalls-ai-1", "target": "api"}, {"source": "opencalls-ai-1", "target": "web"}, {"source": "simbinoise", "target": "eletronics"}, {"source": "simbinoise", "target": "sound"}, {"source": "simbinoise", "target": "glitch"}, {"source": "terra-inscrita", "target": "materiality"}, {"source": "terra-inscrita", "target": "clay"}, {"source": "terra-inscrita", "target": "water"}, {"source": "terra-inscrita", "target": "installation"}, {"source": "terra-inscrita", "target": "processing"}, {"source": "terra-inscrita", "target": "electronics"}, {"source": "terra-inscrita", "target": "research"}, {"source": "terra-inscrita", "target": "projection_mapping"}, {"source": "the-living-body-is-the-center-of-all-politics", "target": "archiving"}, {"source": "the-living-body-is-the-center-of-all-politics", "target": "processing"}, {"source": "the-living-body-is-the-center-of-all-politics", "target": "installation"}, {"source": "the-living-body-is-the-center-of-all-politics", "target": "sound"}, {"source": "the-living-body-is-the-center-of-all-politics", "target": "voices"}, {"source": "vozes-da-terra", "target": "ceramics"}, {"source": "vozes-da-terra", "target": "archiving"}, {"source": "vozes-da-terra", "target": "research"}, {"source": "vozes-da-terra", "target": "voices"}, {"source": "vozes-da-terra", "target": "sound"}, {"source": "vozes-da-terra", "target": "electronics"}]};

    // Shared texture loader/cache (mirrors ConnectionsGraph.loadTexture)
    const textureLoader = new THREE.TextureLoader();
    const textureCache = new Map();
    function loadTexture(url) {
      let tex = textureCache.get(url);
      if (!tex) {
        tex = textureLoader.load(url);
        tex.colorSpace = THREE.SRGBColorSpace;
        textureCache.set(url, tex);
      }
      return tex;
    }

    function tagNode(node, group) {
      const sprite = new SpriteText(node.id);
      sprite.fontFace = "sans-serif";
      sprite.backgroundColor = "white";
      sprite.color = "black";
      sprite.textHeight = 1 * (node.val / 2);
      sprite.padding = 2;
      sprite.position.set(0, 1.6, 0);
      group.add(sprite);
      return group;
    }

    function projectNode(node, group) {
      const material = new THREE.SpriteMaterial({ map: loadTexture(node.thumbnail) });
      const sprite = new THREE.Sprite(material);
      sprite.renderOrder = 10;
      const border = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xffffff }));
      border.renderOrder = 9;
      border.material.opacity = 0;
      const title = new SpriteText(node.title);
      title.fontFace = "sans-serif";
      title.backgroundColor = "white";
      title.color = "black";
      title.textHeight = 1;
      title.padding = 2;
      title.renderOrder = 100;
      title.visible = false;
      group.add(title);
      group.add(sprite);
      group.add(border);
      return group;
    }

    const el = document.getElementById("graph");
    const g = ForceGraph3D({
      rendererConfig: { antialias: true, powerPreference: "high-performance" },
      controlType: "orbit",
    })(el);

    g.graphData(gData)
      .backgroundColor("rgba(0,0,0,0)")
      .linkColor(() => "rgb(0,0,0)")
      .linkOpacity(LINE_OPACITY)
      .showNavInfo(false)
      .numDimensions(3)
      .cameraPosition({ x: 0, y: 0, z: CAMERA_DISTANCE_FAR })
      .width(window.innerWidth)
      .height(getCanvasHeight(window))
      .enableNodeDrag(false)
      .cooldownTime(2000)
      .cooldownTicks(200)
      .d3VelocityDecay(0.71)
      .d3AlphaMin(0.01)
      .d3AlphaDecay(0.04)
      .onNodeHover((node) => {
        // same reset-all-then-highlight shape as the app
        g.graphData().nodes.forEach((n) => {
          if (n.type === "tag" && n.__threeObj) {
            const label = n.__threeObj.children[0];
            if (label.backgroundColor !== "white") label.backgroundColor = "white";
          }
          if (n.type === "project" && n.__threeObj) {
            n.__threeObj.children[1].renderOrder = 10;
            n.__threeObj.children[0].visible = false;
          }
        });
        if (node && node.type === "project" && node.__threeObj) {
          node.__threeObj.children[1].renderOrder = 99;
          node.__threeObj.children[0].visible = true;
        }
        if (node && node.type === "tag" && node.__threeObj) {
          node.__threeObj.children[0].backgroundColor = "rgba(255,255,255,0)";
        }
      })
      .nodeThreeObject((node) => {
        const group = new THREE.Group();
        return node.type === "project" ? projectNode(node, group) : tagNode(node, group);
      });

    g.renderer().setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    g.renderer().debug.checkShaderErrors = false;

    // Size project sprites from node data + collision boxes (mirrors setInitialView)
    setTimeout(() => {
      g.d3Force("link").distance(() => LINK_DISTANCE);
      g.graphData().nodes.forEach((node) => {
        if (node.type === "project" && node.__threeObj && node.width && node.height) {
          const aspect = node.width / node.height;
          const w = node.importance * IMAGE_SCALE * aspect;
          const h = node.importance * IMAGE_SCALE;
          node.__threeObj.children[1].scale.set(w, h);
          node.__threeObj.children[2].scale.set(w, h);
          node.bbox = [[-w/2 - PROJECT_MARGIN, -h/2 - PROJECT_MARGIN], [w/2 + PROJECT_MARGIN, h/2 + PROJECT_MARGIN]];
        }
      });
      g.d3Force("colide", bboxCollide((node) => node.bbox || [[-2,-1],[2,1]]));
      g.d3ReheatSimulation();
    }, 50);

    window.addEventListener("resize", () => {
      g.width(window.innerWidth).height(getCanvasHeight(window));
    });

    // ---- slow-frame meter (independent rAF; does not drive the graph) ----
    const meter = document.getElementById("meter");
    let last = performance.now(), frames = 0, acc = 0, slow = 0, worst = 0;
    function tick(now) {
      const dt = now - last; last = now;
      frames++; acc += dt;
      if (dt > 50) slow++;
      if (dt > worst) worst = dt;
      if (acc >= 500) {
        const fps = (frames / acc) * 1000;
        meter.textContent =
          `fps: ${fps.toFixed(0)}\n` +
          `frame avg: ${(acc / frames).toFixed(1)} ms\n` +
          `worst frame: ${worst.toFixed(0)} ms\n` +
          `slow (>50ms): ${slow}`;
        frames = 0; acc = 0; worst = 0;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
